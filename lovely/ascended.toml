[manifest]
version = "1.0.0"
dump_lua = true
priority = -100

[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/ui.lua"]'''
pattern = '''
{n=G.UIT.O, config={id = 'hand_name', func = 'hand_text_UI_set',object = DynaText({string = {{ref_table = G.GAME.current_round.current_hand, ref_value = "handname_text"}}, colours = {G.C.UI.TEXT_LIGHT}, shadow = true, float = true, scale = scale*1.4})}},
'''
position = "after"
payload = '''
{n=G.UIT.O, config={id = 'vegas_asc', func = 'vegasstuff_asc_UI_set',object = DynaText({string = {{ref_table = G.GAME.current_round.current_hand, ref_value = "vegas_asc_num_text"}}, colours = {G.C.GOLD}, shadow = true, float = true, scale = scale*1})}},
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
                delay = G.GAME.current_round.current_hand.handname ~= disp_text and 0.4 or 0}, {handname=disp_text, level=G.GAME.hands[text].level, mult = G.GAME.hands[text].mult, chips = G.GAME.hands[text].chips})
'''
position = "at"
payload = '''
                delay = G.GAME.current_round.current_hand.handname ~= disp_text and 0.4 or 0}, {handname=disp_text, level=G.GAME.hands[text].level, mult = Vegasstuff.ascend(G.GAME.hands[text].mult), chips = Vegasstuff.ascend(G.GAME.hands[text].chips)})
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
        mult = mod_mult(G.GAME.hands[text].mult)
'''
position = "at"
payload = '''
        mult = mod_mult(Vegasstuff.ascend(G.GAME.hands[text].mult))
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
        hand_chips = mod_chips(G.GAME.hands[text].chips)
'''
position = "at"
payload = '''
        hand_chips = mod_chips(Vegasstuff.ascend(G.GAME.hands[text].chips))
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''
        update_hand_text({delay = 0}, {chips = G.GAME.hands[hand].chips, StatusText = true})
'''
position = "at"
payload = '''
update_hand_text({delay = 0}, {chips = Vegasstuff.ascend(G.GAME.hands[hand].chips), StatusText = true})
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''
        update_hand_text({delay = 0}, {mult = G.GAME.hands[hand].mult, StatusText = true})
'''
position = "at"
payload = '''
update_hand_text({delay = 0}, {mult = Vegasstuff.ascend(G.GAME.hands[hand].mult), StatusText = true})
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
check_and_set_high_score('hand', hand_chips*mult)
'''
position = "before"
payload = '''
    G.E_MANAGER:add_event(Event({
      trigger = 'immediate',
      func = (function()
          if G and G.GAME and G.GAME.current_round and G.GAME.current_round.current_hand then
              G.GAME.current_round.current_hand.vegas_asc_num = 0
              G.GAME.current_round.current_hand.vegas_asc_num_text = ''
          end
          return true
      end)
    }))
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "cardarea.lua"
pattern = '''
update_hand_text({immediate = true, nopulse = nil, delay = 0}, {handname=disp_text, level=G.GAME.hands[text].level, mult = G.GAME.hands[text].mult, chips = G.GAME.hands[text].chips})
'''
position = "at"
payload = '''
update_hand_text({immediate = true, nopulse = nil, delay = 0}, {handname=disp_text, level=G.GAME.hands[text].level, mult = Vegasstuff.ascend(G.GAME.hands[text].mult), chips = Vegasstuff.ascend(G.GAME.hands[text].chips)})
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''
                chip_total_text = '',
'''
position = "after"
payload = '''
                vegas_asc_num = 0,
                vegas_asc_num_text = '',
'''
match_indent = true
